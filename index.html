<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Controller</title>

<style>
body{
  background:#111;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

canvas{
  background:#222;
  border-radius:50%;
}

.btn{
  width:120px;
  height:60px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:10px;
}

#gas{background:green;}
#brake{background:red;}

#speedometer{
  font-size:28px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🚗 Controller</h2>

<canvas id="wheel" width="260" height="260"></canvas>

<br><br>

<button id="gas" class="btn">⛽ GAS</button>
<button id="brake" class="btn">🛑 BRAKE</button>

<div id="speedometer">0 km/h</div>

<script>
const ESP_IP = "192.168.4.1";

let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let angle = 0;

// speed system
let speed = 0;
let accelerating = false;
let braking = false;

// steering draw
function drawWheel(){
    ctx.clearRect(0,0,260,260);

    ctx.save();
    ctx.translate(130,130);
    ctx.rotate(angle);

    ctx.beginPath();
    ctx.arc(0,0,110,0,Math.PI*2);
    ctx.strokeStyle="white";
    ctx.lineWidth=6;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(0,-90);
    ctx.stroke();

    ctx.restore();
}
drawWheel();

// steering control
canvas.addEventListener("touchmove",(e)=>{
    let rect = canvas.getBoundingClientRect();

    let x = e.touches[0].clientX - rect.left - 130;
    let y = e.touches[0].clientY - rect.top - 130;

    angle = Math.atan2(y,x);
    drawWheel();
});

// BUTTON CONTROLS
let gasBtn = document.getElementById("gas");
let brakeBtn = document.getElementById("brake");

// GAS hold
gasBtn.ontouchstart = ()=> accelerating = true;
gasBtn.ontouchend   = ()=> accelerating = false;

// BRAKE hold
brakeBtn.ontouchstart = ()=> braking = true;
brakeBtn.ontouchend   = ()=> braking = false;

// SPEED UPDATE
function updateSpeed(){

    if(accelerating){
        speed += 5; // accelerate
    }
    else if(braking){
        speed -= 10; // brake fast
    }
    else{
        speed *= 0.98; // natural slowdown
    }

    // limit
    if(speed > 255) speed = 255;
    if(speed < 0) speed = 0;

    document.getElementById("speedometer").innerText =
      Math.round(speed/2.5) + " km/h";
}

// SEND DATA
function sendData(){
    fetch(`http://${ESP_IP}/control?angle=${angle}&speed=${Math.round(speed)}`)
    .catch(()=>{});
}

// LOOP
setInterval(()=>{
    updateSpeed();
    sendData();
}, 50);
</script>

</body>
</html>
